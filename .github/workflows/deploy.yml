name: 'Terraform GitOps Pipeline'

on:
  push:
    branches: [ "main" ]
  # Добавляет кнопку запуска пайплайна вручную на сайте GitHub
  workflow_dispatch:
    inputs:
      action:
        description: 'Что сделать? (apply или destroy)'
        required: true
        default: 'apply'
        type: choice
        options:
        - apply
        - destroy

jobs:
  terraform:
    name: 'Terraform Run'
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Terraform Init
      env:
        TF_CLI_CONFIG_FILE: "./terraform.rc"
      run: terraform init -reconfigure

    # Запускается при обычном пуше или если вручную выбрали 'apply'
    - name: Terraform Apply
      if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
      env:
        TF_CLI_CONFIG_FILE: "./terraform.rc"
      run: terraform apply -auto-approve

    # Запускается ТУЛЬКО если на сайте вручную выбрали 'destroy'
    - name: Terraform Destroy
      if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
      env:
        TF_CLI_CONFIG_FILE: "./terraform.rc"
      run: terraform destroy -auto-approve
