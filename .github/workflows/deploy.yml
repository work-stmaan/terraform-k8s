name: 'Terraform GitOps Pipeline'

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform:
    name: 'Terraform Run'
    runs-on: self-hosted

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Исправляем URL зеркала (добавляем terraform-mirror.)
    - name: Configure Terraform Mirror
      run: |
        cat << 'INNER_EOF' > ~/.terraformrc
        provider_installation {
          network_mirror {
            url = "https://yandexcloud.net"
            include = ["registry.terraform.io/*/*"]
          }
          direct {
            exclude = ["registry.terraform.io/*/*"]
          }
        }
        INNER_EOF

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      if: github.event_name == 'pull_request'
      run: terraform plan

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: terraform apply -auto-approve
